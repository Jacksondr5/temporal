name: Deploy Convex on main push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Convex
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: convex-deploy-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify deploy key is set
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "::error::CONVEX_DEPLOY_KEY secret is not set"
            exit 1
          fi
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Deploy Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: pnpm convex:deploy --prod
