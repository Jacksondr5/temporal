<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1024 1024"
  fill="none"
>
  <defs>
    <linearGradient
      id="rg"
      x1="60"
      y1="512"
      x2="964"
      y2="512"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#FF0000" />
      <stop offset="0.42" stop-color="#B51A1A" />
      <stop offset="0.5" stop-color="#2F2F2F" />
      <stop offset="0.58" stop-color="#1D7A2A" />
      <stop offset="1" stop-color="#22E63E" />
    </linearGradient>

    <radialGradient
      id="whiteDisc"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(512 430) rotate(90) scale(420)"
    >
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#F4F1FA" />
    </radialGradient>
  </defs>

  <!-- Outer ring -->
  <circle
    cx="512"
    cy="512"
    r="452"
    stroke="url(#rg)"
    stroke-width="96"
  />

  <!-- Inner white disc -->
  <circle cx="512" cy="512" r="404" fill="url(#whiteDisc)" />

  <!-- Logo mark -->
  <path
    d="M388 378V442C388 500 420 528 470 548C497 559 512 577 512 602V632"
    stroke="url(#rg)"
    stroke-width="84"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M636 378V442C636 500 604 528 554 548C527 559 512 577 512 602V632"
    stroke="url(#rg)"
    stroke-width="84"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M512 632V648"
    stroke="url(#rg)"
    stroke-width="84"
    stroke-linecap="round"
  />

  <circle cx="388" cy="378" r="58" fill="url(#rg)" />
  <circle cx="636" cy="378" r="58" fill="url(#rg)" />
  <circle cx="512" cy="648" r="58" fill="url(#rg)" />
</svg>