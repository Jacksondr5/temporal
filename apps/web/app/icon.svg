<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background (--card colour, oklch(0.15 0.012 250) ≈ #10151f) -->
  <rect width="32" height="32" rx="7" fill="#10151f"/>
  <!-- Subtle primary tint (bg-primary/12) -->
  <rect width="32" height="32" rx="7" fill="#3ecfbe" fill-opacity="0.12"/>
  <!-- Ring (ring-primary/30) -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#3ecfbe" stroke-width="1" stroke-opacity="0.30"/>

  <!-- Lucide Radio icon, scaled from 24×24 into a 20×20 area centred in the 32×32 tile -->
  <g transform="translate(6,6) scale(0.8333)">
    <!-- Outer arcs -->
    <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"
          stroke="#3ecfbe" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.55"/>
    <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"
          stroke="#3ecfbe" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.55"/>
    <!-- Inner arcs -->
    <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"
          stroke="#3ecfbe" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"
          stroke="#3ecfbe" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <!-- Centre dot -->
    <circle cx="12" cy="12" r="2.5" fill="#3ecfbe"/>
  </g>
</svg>
